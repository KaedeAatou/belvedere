name: Deploy Orchestrator (ADK/A2A) to Cloud Run

# Refinement を ADK エージェントとして A2A 公開する orchestrator-py を Cloud Run へデプロイする。
#
# トリガは **手動 (workflow_dispatch) のみ**。push 自動デプロイにしないのは、本サービスが
# 以下の前提 (ユーザー専権 / docs参照) を要するため、push CI を赤くしないように手動に留める:
#   - Secret Manager: GEMINI_API_KEY (ADK の Gemini 推論) + BELVEDERE_SERVICE_TOKEN
#     (Refinement tool が Belvedere API を service token で叩く) が存在し、runtime SA が secretAccessor
#   - API → orchestrator の到達: 簡便のため --allow-unauthenticated (公開) でデプロイ
#     (Refinement の A2A エンドポイントのみ / 機密データは持たない)。認証付きにするなら run.invoker 付与に変更
#   - BELVEDERE_API_URL = デプロイ済 api の URL
#
# 認証は Workload Identity Federation 経由 (鍵レス / deploy-api.yml と同じ Pool/Provider/SA)。

on:
  workflow_dispatch:
    inputs:
      env:
        description: "deploy target env"
        type: choice
        options: [dev, prod]
        default: dev
      gemini_model:
        description: "ADK エージェントの Gemini モデル(flash=無料枠で安全 / pro=有料キー必須。TS 側 promote-prod.yml と揃える)"
        type: choice
        options: [gemini-2.5-flash, gemini-2.5-pro]
        default: gemini-2.5-flash

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_DEV: belvedere-dev-atrium
  GCP_PROJECT_PROD: belvedere-prod-atrium
  GCP_REGION: asia-northeast1
  SERVICE: belvedere-orchestrator
  REPO: belvedere   # 既存 Artifact Registry リポジトリ (api/web と共用 / SA は writer 保有)
  # WIF / runtime SA は env 別 (dev=projectNumber 876087923874 / prod=909552127234)。Resolve step が env=prod 時に PROD を選ぶ。
  WIF_PROVIDER_DEV: projects/876087923874/locations/global/workloadIdentityPools/belvedere-ci-pool/providers/belvedere-ci-github
  WIF_PROVIDER_PROD: projects/909552127234/locations/global/workloadIdentityPools/belvedere-ci-pool/providers/belvedere-ci-github
  WIF_SA_DEV: belvedere-deployer@belvedere-dev-atrium.iam.gserviceaccount.com
  WIF_SA_PROD: belvedere-deployer@belvedere-prod-atrium.iam.gserviceaccount.com
  RUNTIME_SA_DEV: belvedere-runtime@belvedere-dev-atrium.iam.gserviceaccount.com
  RUNTIME_SA_PROD: belvedere-runtime@belvedere-prod-atrium.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.env || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target project
        id: target
        run: |
          if [ "${{ github.event.inputs.env || 'dev' }}" = "prod" ]; then
            echo "project=$GCP_PROJECT_PROD" >> $GITHUB_OUTPUT
            echo "wif_provider=$WIF_PROVIDER_PROD" >> $GITHUB_OUTPUT
            echo "wif_sa=$WIF_SA_PROD" >> $GITHUB_OUTPUT
            echo "runtime_sa=$RUNTIME_SA_PROD" >> $GITHUB_OUTPUT
          else
            echo "project=$GCP_PROJECT_DEV" >> $GITHUB_OUTPUT
            echo "wif_provider=$WIF_PROVIDER_DEV" >> $GITHUB_OUTPUT
            echo "wif_sa=$WIF_SA_DEV" >> $GITHUB_OUTPUT
            echo "runtime_sa=$RUNTIME_SA_DEV" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.target.outputs.wif_provider }}
          service_account: ${{ steps.target.outputs.wif_sa }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.target.outputs.project }}

      - name: Build orchestrator image to existing Artifact Registry repo (belvedere)
        # --source は cloud-run-source-deploy リポジトリを自動作成しようとし、deployer SA に
        # artifactregistry.repositories.create が無いと PERMISSION_DENIED で落ちる。api/web が既に使う
        # 既存 belvedere リポジトリ (SA は writer 保有) へ Cloud Build で build+push すれば追加 IAM 不要。
        # config 経由 (CLOUD_LOGGING_ONLY) にするのは、--tag 直叩きだと GCS ログ stream 権限が要り
        # deployer SA では "can only stream logs" で失敗するため (api/web と同じ回避)。
        run: |
          PROJECT="${{ steps.target.outputs.project }}"
          SHORT_SHA="${{ github.sha }}"; SHORT_SHA="${SHORT_SHA:0:7}"
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/$PROJECT/${{ env.REPO }}/orchestrator:$SHORT_SHA"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          gcloud builds submit apps/orchestrator-py \
            --config infra/cloudbuild.orchestrator.yaml \
            --substitutions=_REGION=${{ env.GCP_REGION }},_REPO=${{ env.REPO }},_TAG=$SHORT_SHA \
            --project "$PROJECT"

      - name: Deploy to Cloud Run (USE_REAL_ADK=true で A2A 公開)
        run: |
          ENV="${{ github.event.inputs.env || 'dev' }}"
          PROJECT="${{ steps.target.outputs.project }}"
          MODEL="${{ github.event.inputs.gemini_model || 'gemini-2.5-flash' }}"
          API_URL=$(gcloud run services describe belvedere-api-$ENV \
            --region=${{ env.GCP_REGION }} --project=$PROJECT --format='value(status.url)' 2>/dev/null || echo "")
          # GEMINI_MODEL_OVERRIDE で ADK 全 agent のモデルを固定する。無指定だと agents.py の既定で
          # Refinement 等が gemini-2.5-pro を叩き、無料枠キー (pro=limit0) では 429 → A2A エラー →
          # TS runAgent へ静かに fallback してしまい「ADK が本番で動いた」実証にならない。既定 flash で安全側に倒す。
          gcloud run deploy ${{ env.SERVICE }}-$ENV \
            --image "$IMAGE" \
            --region ${{ env.GCP_REGION }} \
            --project $PROJECT \
            --service-account ${{ steps.target.outputs.runtime_sa }} \
            --allow-unauthenticated \
            --set-env-vars USE_REAL_ADK=true,GOOGLE_CLOUD_PROJECT=$PROJECT,BELVEDERE_API_URL=$API_URL,GEMINI_MODEL_OVERRIDE=$MODEL \
            --set-secrets GEMINI_API_KEY=GEMINI_API_KEY:latest,BELVEDERE_SERVICE_TOKEN=BELVEDERE_SERVICE_TOKEN:latest

      - name: Output service URL
        run: |
          ENV="${{ github.event.inputs.env || 'dev' }}"
          URL=$(gcloud run services describe ${{ env.SERVICE }}-$ENV \
            --region=${{ env.GCP_REGION }} --project=${{ steps.target.outputs.project }} \
            --format='value(status.url)')
          echo "🤖 Orchestrator (ADK/A2A) deployed to: $URL"
          echo "→ Belvedere API に ORCHESTRATOR_A2A_URL=$URL と REFINEMENT_VIA_ADK=true を設定すると Refinement が A2A 経由になります"
