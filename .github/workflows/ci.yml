name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ts-typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck

  py-lint:
    name: Python lint + type
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/orchestrator-py
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - name: Sync deps
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check src
      - name: Mypy
        run: uv run mypy src
        continue-on-error: true   # 雛形段階では非ブロック
