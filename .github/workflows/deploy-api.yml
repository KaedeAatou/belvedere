name: Deploy API to Cloud Run

# トリガ:
# - push to main (apps/api / packages / infra 配下が変わった時のみ)
# - 手動 (workflow_dispatch / dev or prod 切替)
#
# 認証は Workload Identity Federation 経由 (鍵ファイル不要)。
# 事前設定: docs/setup-github-wif.md
#
# 注意: 現在の WIF_PROVIDER / WIF_SA は dev project (belvedere-dev-atrium) 用。
# prod project (belvedere-prod-atrium) でも同じ手順 (Pool / Provider / SA + 6 ロール) を
# 別途実施し、env=prod 時に切替えるロジックを追加するのは Phase 2 以降。

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'infra/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      env:
        description: "deploy target env"
        type: choice
        options: [dev, prod]
        default: dev
      llm_provider:
        description: "LLM provider (gemini=実AI / mock=フォールバック)"
        type: choice
        options: [gemini, mock]
        default: gemini
      gemini_model:
        description: "Gemini モデル (flash=無料枠で安全 / pro=有料キー必須・無料枠は limit0)"
        type: choice
        options: [gemini-2.5-flash, gemini-2.5-pro]
        default: gemini-2.5-flash
      search_backend:
        description: "RAG 検索 backend (none=OFF既定/本番不変 / firestore=GCPネイティブ Vector / elastic / mock)"
        type: choice
        options: [none, firestore, elastic, mock]
        default: none

permissions:
  contents: read
  id-token: write   # WIF に必要

env:
  GCP_PROJECT_DEV: belvedere-dev-atrium
  GCP_PROJECT_PROD: belvedere-prod-atrium
  GCP_REGION: asia-northeast1
  REPO: belvedere
  SERVICE: belvedere-api
  WIF_PROVIDER: projects/876087923874/locations/global/workloadIdentityPools/belvedere-ci-pool/providers/belvedere-ci-github
  WIF_SA: belvedere-deployer@belvedere-dev-atrium.iam.gserviceaccount.com
  RUNTIME_SA_NAME: belvedere-runtime

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.env || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target project
        id: target
        run: |
          if [ "${{ github.event.inputs.env || 'dev' }}" = "prod" ]; then
            echo "project=$GCP_PROJECT_PROD" >> $GITHUB_OUTPUT
          else
            echo "project=$GCP_PROJECT_DEV"  >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.target.outputs.project }}

      - name: Submit Cloud Build
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          # _LLM_PROVIDER / _GEMINI_MODEL_OVERRIDE / _REPO_BACKEND は cloudbuild.yaml のデフォルトに依存せず明示的に渡す
          # (silent な default 切替で本番挙動が変わる事故を防止)。
          # push 時は gemini + flash 既定 (無料枠で安全)。手動実行は workflow_dispatch のドロップダウンで provider/model を選ぶ。
          # 前提: 対象プロジェクトの Secret Manager に GEMINI_API_KEY が存在し、ランタイム SA が secretAccessor を持つこと (docs/setup-gcp.md)。
          gcloud builds submit \
            --config infra/cloudbuild.yaml \
            --substitutions=_REGION=${{ env.GCP_REGION }},_REPO=${{ env.REPO }},_SERVICE=${{ env.SERVICE }},_ENV=${{ github.event.inputs.env || 'dev' }},_RUNTIME_SA=${{ env.RUNTIME_SA_NAME }},_LLM_PROVIDER=${{ github.event.inputs.llm_provider || 'gemini' }},_GEMINI_MODEL_OVERRIDE=${{ github.event.inputs.gemini_model || 'gemini-2.5-flash' }},_REPO_BACKEND=firestore,_SEARCH_BACKEND=${{ github.event.inputs.search_backend || 'none' }},_TAG=$SHORT_SHA \
            --project=${{ steps.target.outputs.project }} \
            .

      - name: Output service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }}-${{ github.event.inputs.env || 'dev' }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ steps.target.outputs.project }} \
            --format='value(status.url)')
          echo "🌬  Deployed to: $URL"
          echo "$URL" > url.txt

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-url-${{ github.event.inputs.env || 'dev' }}
          path: url.txt
