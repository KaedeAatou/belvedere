# Cloud Build パイプライン
# 用途: API コンテナをビルドして Artifact Registry に push、Cloud Run にデプロイ
#
# 起動方法:
#   gcloud builds submit \
#     --config infra/cloudbuild.yaml \
#     --substitutions=_REGION=asia-northeast1,_ENV=dev,_SERVICE=belvedere-api,_REPO=belvedere \
#     .
#
# あるいは GitHub 連携で push 時に自動起動

substitutions:
  _REGION: asia-northeast1
  _REPO: belvedere
  _SERVICE: belvedere-api
  _ENV: dev
  _RUNTIME_SA: belvedere-runtime
  _LLM_PROVIDER: mock      # mock / gemini。gemini の時だけ Secret Manager の GEMINI_API_KEY をマウントする (deploy step 参照)
  _GEMINI_MODEL_OVERRIDE: gemini-2.5-flash  # flash↔pro 切替の単一つまみ。全 agent をこのモデルに上書き。無料枠キーは pro=limit0 のため flash 既定。有料キーで per-agent mix にしたい時は空文字 (AGENT_MODEL を正とする)
  _REPO_BACKEND: firestore # Phase 1-B (2026-06-09) で memory → firestore に切替。runtime SA は datastore.user 保有
  _SEARCH_BACKEND: none    # RAG 検索層 (none=OFF 既定/本番不変 / firestore=GCP Vector / elastic / mock)。firestore 時は GEMINI_API_KEY が埋め込みに必要
  _TAG: latest             # CI から GITHUB_SHA::7 を渡す。SHORT_SHA は gcloud builds submit 経由では空のため _TAG で代替

# image tag は _TAG (= short SHA) を使う
images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:${_TAG}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:latest"

steps:
  # ---- Build ----
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:${_TAG}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:latest"
      - -f
      - apps/api/Dockerfile
      - .

  # ---- Push ----
  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, "--all-tags", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api"]
    waitFor: [build]

  # ---- Deploy to Cloud Run ----
  # bash 経由にして --set-secrets を _LLM_PROVIDER=gemini の時だけ付ける。
  # mock デプロイ (フォールバック / 初回 secret 未作成時) では secret をマウントせず壊れない。
  # ($$ は Cloud Build のエスケープ = bash に literal $ を渡す。${_FOO} / $PROJECT_ID は Cloud Build が事前置換)
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        SECRET_FLAG=""
        if [ "${_LLM_PROVIDER}" = "gemini" ]; then
          # Secret Manager の GEMINI_API_KEY:latest を実行時 env としてマウント (ランタイム SA に secretAccessor 必須)
          SECRET_FLAG="--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest"
        fi
        # --allow-unauthenticated: Cloud Run IAM は allUsers のまま。エンドユーザー認証はアプリ層 (Firebase Auth)。
        # /health は監視用に公開、/login は認証画面自体、/api/* はアプリ層で JWT 必須。
        gcloud run deploy "${_SERVICE}-${_ENV}" \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --service-account=${_RUNTIME_SA}@${PROJECT_ID}.iam.gserviceaccount.com \
          --set-env-vars=LLM_PROVIDER=${_LLM_PROVIDER},REPO_BACKEND=${_REPO_BACKEND},GCP_PROJECT=${PROJECT_ID},GCP_REGION=${_REGION},GEMINI_MODEL_OVERRIDE=${_GEMINI_MODEL_OVERRIDE},SEARCH_BACKEND=${_SEARCH_BACKEND} \
          --memory=512Mi \
          --cpu=1 \
          --timeout=300s \
          --concurrency=40 \
          --max-instances=3 \
          --min-instances=0 \
          $$SECRET_FLAG
    waitFor: [push]

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
